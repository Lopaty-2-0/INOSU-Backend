services:
  redis:
    image: redis:7-alpine
    container_name: inosu-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  inosu-backend:
    build:
      context: .
    container_name: inosu-backend
    ports:
      - "5000:5000"
    depends_on:
      - redis
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379